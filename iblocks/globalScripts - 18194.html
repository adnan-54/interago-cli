<!-- smooth scroll -->
<script>
  gsap.registerPlugin(ScrollTrigger);

  const lenis = new Lenis({
    lerp: 0.05,
    wheelMultiplier: 0.7,
    duration: 1.6,
    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -9 * t)),
  });

  window.lenis = lenis;

  lenis.on("scroll", ScrollTrigger.update);

  gsap.ticker.add((time) => {
    lenis.raf(time * 1000);
  });

  gsap.ticker.lagSmoothing(0);
</script>

<!-- menu overlay -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const overlay = document.getElementById("menuOverlay");
    const panel = overlay.querySelector(".menuPanel");
    const toggleBtns = document.querySelectorAll(".menuToggle");

    function openMenu() {
      overlay.showModal();
      overlay.offsetWidth; // force synchronous reflow — commits initial state before transition
      overlay.classList.add("open");
      window.lenis && window.lenis.stop();
    }

    function closeMenu() {
      overlay.classList.remove("open");
      panel.addEventListener("transitionend", function handler() {
        panel.removeEventListener("transitionend", handler);
        overlay.close();
        window.lenis && window.lenis.start();
      });
    }

    toggleBtns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        overlay.open ? closeMenu() : openMenu();
      });
    });

    // backdrop click
    overlay.addEventListener("click", function (e) {
      if (e.target === overlay) closeMenu();
    });

    // intercept native Escape to animate close instead of instant dismiss
    overlay.addEventListener("cancel", function (e) {
      e.preventDefault();
      closeMenu();
    });
  });
</script>

<!-- header -->
<script>
  document.addEventListener("DOMContentLoaded", createScrollHeader);

  function createScrollHeader() {
    const header = document.querySelector("header");
    let lastScrollTop = 0;

    function fixedHeader() {
      const scrollTop =
        window.pageYOffset !== undefined
          ? window.pageYOffset
          : (
              document.documentElement ||
              document.body.parentNode ||
              document.body
            ).scrollTop;

      if (scrollTop >= 1) header.classList.add("fixed");
      else header.classList.remove("fixed");
    }

    function scrollHeader() {
      const scrollTop =
        window.pageYOffset || document.documentElement.scrollTop;

      if (scrollTop > lastScrollTop) {
        header.classList.remove("slideDown");
        header.classList.add("slideUp");
      } else {
        header.classList.add("slideDown");
        header.classList.remove("slideUp");
      }

      lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
    }

    let timeoutId = 0;

    window.addEventListener(
      "scroll",
      () => {
        fixedHeader();
        scrollHeader();
      },
      false,
    );
  }
</script>

<!-- zap V2 -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const screenWidth = window.innerWidth;
    const whatsLinks = document.querySelectorAll(".whatsLink");

    whatsLinks.forEach((link) => {
      const linkHref = link.href;
      const hrefSplit = linkHref.split(".");

      link.setAttribute(
        "href",
        getPrefix() + hrefSplit[1] + "." + hrefSplit[2],
      );

      link.setAttribute("target", "_blank");
    });

    function getPrefix() {
      if (screenWidth >= 991) return "https://web.";
      else return "https://api.";
    }
  });
</script>

<!-- carousel -->
<script>
  (function () {
    const ANIM_MS = 600;

    const styleEl = document.createElement("style");
    styleEl.textContent = `
    .carousel {
      position: relative;
      overflow: hidden;
    }
    .carousel._dragging {
      cursor: grabbing;
      user-select: none;
    }
    .carousel .slide[data-state="hidden"] {
      position: absolute !important;
      inset: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .carousel .slide[data-state="visible"] {
      position: relative !important;
    }
    .carousel .slide[data-state="changing"] {
      position: absolute !important;
      inset: 0;
      z-index: 1;
      animation: _carousel-enter ${ANIM_MS}ms cubic-bezier(0, 0, 0.2, 1) forwards;
    }
    @keyframes _carousel-enter {
      from { transform: translateX(100%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    ._carousel-sr {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  `;
    document.head.appendChild(styleEl);

    class Carousel {
      constructor(el) {
        this.el = el;
        this.slides = Array.from(el.querySelectorAll(":scope > .slide"));
        this.duration = parseInt(el.dataset.duration, 10) || 5000;
        this.autoplay = el.dataset.autoplay !== "false";
        this.currentIndex = 0;
        this._timer = null;
        this._startTime = null;
        this._busy = false;
        this._init();
      }

      _init() {
        this.el.setAttribute("aria-roledescription", "carousel");
        if (!this.el.hasAttribute("aria-label")) {
          this.el.setAttribute("aria-label", "Slideshow");
        }

        this._live = document.createElement("div");
        this._live.className = "_carousel-sr";
        this._live.setAttribute("aria-live", "polite");
        this._live.setAttribute("aria-atomic", "true");
        this.el.appendChild(this._live);

        this.slides.forEach((slide, i) => {
          slide.setAttribute("role", "group");
          slide.setAttribute("aria-roledescription", "slide");
          slide.setAttribute("aria-label", `${i + 1} de ${this.slides.length}`);
          this._setState(slide, i === 0 ? "visible" : "hidden");
        });

        this.el.dataset.carouselState = this.autoplay ? "playing" : "paused";
        if (this.autoplay) this._startTimer();
        this._initDrag();
      }

      _initDrag() {
        let startX = 0;
        let startY = 0;
        let dragging = false;
        let didDrag = false;

        const THRESHOLD = 50;

        const onStart = (x, y) => {
          startX = x;
          startY = y;
          didDrag = false;
        };

        const onEnd = (x, y) => {
          const dx = x - startX;
          const dy = y - startY;
          if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > THRESHOLD) {
            dx < 0 ? this.next() : this.previous();
          }
        };

        // Touch
        this.el.addEventListener(
          "touchstart",
          (e) => {
            onStart(e.touches[0].clientX, e.touches[0].clientY);
          },
          { passive: true },
        );

        this.el.addEventListener(
          "touchend",
          (e) => {
            onEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
          },
          { passive: true },
        );

        // Mouse
        this.el.addEventListener("mousedown", (e) => {
          if (e.button !== 0) return;
          dragging = true;
          didDrag = false;
          this.el.classList.add("_dragging");
          onStart(e.clientX, e.clientY);
          e.preventDefault();
        });

        document.addEventListener("mousemove", (e) => {
          if (!dragging) return;
          if (Math.abs(e.clientX - startX) > 5) didDrag = true;
        });

        document.addEventListener("mouseup", (e) => {
          if (!dragging) return;
          dragging = false;
          this.el.classList.remove("_dragging");
          onEnd(e.clientX, e.clientY);
        });

        // Block click on links/buttons after a drag
        this.el.addEventListener(
          "click",
          (e) => {
            if (didDrag) {
              e.preventDefault();
              e.stopPropagation();
              didDrag = false;
            }
          },
          true,
        );
      }

      _setState(slide, state) {
        slide.dataset.state = state;
        const hidden = state === "hidden";
        slide.setAttribute("aria-hidden", String(hidden));
        if (hidden) {
          slide.setAttribute("inert", "");
        } else {
          slide.removeAttribute("inert");
        }
      }

      _goTo(index) {
        if (this._busy || index === this.currentIndex) return;
        if (index < 0 || index >= this.slides.length) return;

        this._busy = true;
        this._clearTimer();

        const prev = this.slides[this.currentIndex];
        const next = this.slides[index];

        this._setState(next, "changing");

        let settled = false;
        const settle = () => {
          if (settled) return;
          settled = true;
          next.removeEventListener("animationend", settle);
          this._setState(prev, "hidden");
          this._setState(next, "visible");
          this.currentIndex = index;
          this._busy = false;
          this._announce(`Slide ${index + 1} de ${this.slides.length}`);
          this.el.dispatchEvent(
            new CustomEvent("carousel:change", {
              bubbles: true,
              detail: { index, slide: next },
            }),
          );
          if (this.autoplay) this._startTimer();
        };

        next.addEventListener("animationend", settle);
        setTimeout(settle, ANIM_MS + 50);
      }

      _startTimer() {
        this._startTime = Date.now();
        this._timer = setTimeout(() => this.next(), this.duration);
      }

      _clearTimer() {
        clearTimeout(this._timer);
        this._timer = null;
        this._startTime = null;
      }

      _announce(text) {
        this._live.textContent = "";
        requestAnimationFrame(() => {
          this._live.textContent = text;
        });
      }

      play() {
        if (this.autoplay) return;
        this.autoplay = true;
        this.el.dataset.carouselState = "playing";
        this._startTimer();
      }

      pause() {
        if (!this.autoplay) return;
        this.autoplay = false;
        this.el.dataset.carouselState = "paused";
        this._clearTimer();
      }

      next() {
        this._goTo((this.currentIndex + 1) % this.slides.length);
      }

      previous() {
        this._goTo(
          (this.currentIndex - 1 + this.slides.length) % this.slides.length,
        );
      }

      getProgress() {
        if (!this._startTime) return 0;
        return Math.min((Date.now() - this._startTime) / this.duration, 1);
      }

      getCurrentSlide() {
        return { index: this.currentIndex, el: this.slides[this.currentIndex] };
      }
    }

    function initAll() {
      document
        .querySelectorAll(".carousel:not([data-carousel-state])")
        .forEach((el) => {
          el._carousel = new Carousel(el);
        });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initAll);
    } else {
      initAll();
    }

    window.Carousel = Carousel;
  })();
</script>
