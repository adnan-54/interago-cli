<style>
  header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    isolation: isolate;
    transition: all 0.3s ease-in-out;
    z-index: 999;
    border-bottom: 2px solid #005da8;
    background: #fff;
    height: 120px;
  }

  header.fixed {
    height: 100px;
  }

  header.slideUp {
    transform: translateY(-100%);
  }

  header .container {
    display: flex;
    align-items: center;
    justify-content: start;
    gap: 20px;
    height: 100%;
  }

  header .logo {
    margin-right: auto;
    transition: filter 0.3s ease;
  }

  header .logo .logoMobile {
    display: none;
  }

  header .atendimento {
    width: 100%;
    text-align: center;
    max-width: 193px;
  }

  @media (max-width: 768px) {
    header {
      height: 100px;
    }

    header .logo .logoFull {
      display: none;
    }

    header .logo .logoMobile {
      display: inline-block;
      max-height: 60px;
    }

    header .atendimento {
      width: fit-content;
    }
  }

  @media (max-width: 576px) {
    header .atendimento {
      display: none;
    }
  }

  /* menu */
  .menuButton {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding-block: 10px;
    background: transparent;
    color: #393837;
    font-size: 1rem;
    font-size: clamp(1rem, 0.975rem + 0.125vw, 1.125rem);
    font-weight: 400;
    line-height: normal;
    cursor: pointer;
    border: none;
    transition:
      color 0.3s ease,
      filter 0.3s ease;
  }

  .menuButton:hover {
    color: var(--primary);
    filter: brightness(1.2);
  }

  @media (max-width: 768px) {
    .menuButton .label {
      display: none;
    }
  }

  /* overlay backdrop */
  dialog.menuOverlay {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    border: none;
    padding: 0;
    margin: 0;
    background: rgba(0, 0, 0, 0);
    transition: background 0.3s ease;
    overflow: clip;
  }

  dialog.menuOverlay::backdrop {
    background: transparent;
  }

  dialog.menuOverlay.open {
    background: rgba(0, 0, 0, 0.6);
  }

  /* slide-in panel */
  .menuPanel {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    width: 100%;
    max-width: 300px;
    background: #fff;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 1001;
    display: flex;
    flex-direction: column;
    padding: 24px;
    gap: 32px;
  }

  .menuOverlay.open .menuPanel {
    transform: translateX(0);
  }

  .menuClose {
    align-self: flex-start;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    padding: 0;
    background: transparent;
    border: none;
    cursor: pointer;
    color: #1e1e1e;
    transition: color 0.3s ease;
  }

  .menuClose:hover {
    color: var(--primary);
  }

  .menuNav {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    border-top: 1px solid #eee;
  }

  .menuNav a {
    display: block;
    padding: 12px 0;
    font-weight: 500;
    border-bottom: 1px solid #eee;
    transition: color 0.2s ease;
  }

  .menuNav a:hover {
    color: var(--primary);
  }

  .menuAtendimento {
    display: none;
    width: 100%;
    text-align: center;
  }

  @media (max-width: 576px) {
    .menuAtendimento {
      display: block;
    }
  }
</style>
